server.port=8080
spring.application.name=piedrazul-appointments

# BASE DE DATOS POSTGRESQL
spring.datasource.url=jdbc:postgresql://localhost:5432/piedrazul
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=admin

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# KEYCLOAK
keycloak.server-url=http://localhost:8180
keycloak.realm=piedrazul
keycloak.admin-username=admin
keycloak.admin-password=admin
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8180/realms/piedrazul/protocol/openid-connect/certs}